<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <title>皓晟徐薇英文 - 單字討伐</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0, user-scalable=no, shrink-to-fit=no">
  
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/vue/3.3.4/vue.global.prod.min.js"></script>
  <script src="https://unpkg.com/@phosphor-icons/web"></script>
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  
  <style>
    .scrollbar-hide::-webkit-scrollbar { display: none; }
    .scrollbar-hide { -ms-overflow-style: none; scrollbar-width: none; }
    [v-cloak] { display: none; }
    
    /* 🛡️ CSS 防禦：禁止頁面彈性橡皮筋效果、禁止點擊縮放、防止文字自動調整大小 */
    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      position: fixed; /* 防止行動裝置下拉網頁時產生空白頁頭 */
      -webkit-text-size-adjust: 100%;
      touch-action: manipulation; /* 停用雙擊縮放，優化連續點擊手感 */
    }

    input[type="text"] { 
      font-size: 16px !important; /* iOS 只要達到 16px 以上就絕對不會觸發自動放大 */
    }
    
    /* 智慧排版：寬度超過 900px（平板橫放/電腦）才啟動雙欄，手機一律直向一欄滿版 */
    .game-container {
      display: flex;
      flex-direction: column;
      height: 100%;
      justify-content: space-between;
    }
    @media (min-width: 900px) {
      .game-container {
        flex-direction: row;
        align-items: center;
        gap: 2rem;
      }
    }
  </style>
</head>
<body class="bg-slate-950 text-white selection:bg-red-500/30">
  <div id="app" v-cloak class="w-full h-full">
    
    <div v-if="gameState === 'LOADING'" class="w-full h-full bg-slate-950 flex flex-col items-center justify-center p-12 text-center">
      <p class="text-slate-500 font-black text-xs uppercase animate-pulse mb-4">正在連接異界...</p>
      <div class="w-12 h-12 border-4 border-red-600/30 border-t-red-600 rounded-full animate-spin"></div>
    </div>

    <div v-if="gameState === 'START'" class="w-full h-full bg-slate-950 flex flex-col items-center justify-center p-6 relative overflow-hidden text-center">
      <div class="relative z-10 space-y-6 my-auto max-w-2xl">
        <p v-if="studentName" class="text-yellow-400 font-black text-sm bg-yellow-400/10 px-4 py-1.5 rounded-full border border-yellow-500/20 inline-block animate-bounce">
          ⚡ 歡迎皓孩子勇者：{{ studentName }} 踏上單字征途！
        </p>
        
        <h1 class="text-4xl md:text-7xl lg:text-8xl font-black drop-shadow-2xl tracking-tight uppercase leading-tight">
          皓晟徐薇英文<br>
          <span class="text-red-600 block mt-2 text-5xl md:text-8xl">單字討伐</span>
        </h1>
        <div class="h-1.5 w-48 bg-red-600 mx-auto rounded-full shadow-[0_0_20px_rgba(220,38,38,0.5)]"></div>
        <p class="text-slate-500 tracking-[0.8em] uppercase text-xs font-black">Vocab Crusader: The Ultimate Quest</p>
        <div class="py-8 flex flex-col items-center space-y-6">
          <button @click="gameState = 'SELECT_DIFFICULTY'" class="group relative px-20 py-5 font-black text-2xl transition-all outline-none">
            <span class="absolute inset-0 bg-white text-black rounded-2xl skew-x-[-12deg] group-hover:bg-red-600 transition-all shadow-xl"></span>
            <span class="relative z-10 text-black group-hover:text-white transition-colors uppercase">踏上征途</span>
          </button>
          <button @click="openLeaderboard" class="flex items-center space-x-2 text-slate-400 hover:text-yellow-400 transition-colors font-bold text-lg mt-4">
            <i class="ph-fill ph-trophy"></i> <span>英雄榜</span>
          </button>
        </div>
        <p v-if="formError" class="text-red-500 text-sm mt-2" v-text="formError"></p>
      </div>
    </div>

    <div v-if="gameState === 'LEADERBOARD'" class="w-full h-full bg-slate-950 flex flex-col items-center p-4 md:p-12 relative overflow-y-auto scrollbar-hide">
      <button @click="gameState = 'START'" class="absolute top-4 left-4 flex items-center space-x-2 text-slate-400 hover:text-white font-bold text-xs bg-white/5 px-3 py-1.5 rounded-full border border-white/10">
        <i class="ph-bold ph-arrow-left"></i> <span>返回</span>
      </button>
      <h2 class="text-3xl md:text-5xl font-black mb-6 mt-8 tracking-widest uppercase text-yellow-500 flex items-center justify-center">
        <i class="ph-fill ph-crown mr-3"></i>討伐英雄榜
      </h2>
      <div v-if="Object.keys(leaderboardData).length === 0" class="text-slate-500 font-bold mt-20">目前還沒有英雄留下紀錄，快去挑戰吧！</div>
      <div v-else class="w-full max-w-4xl">
        <div class="flex flex-wrap gap-2 justify-center mb-6">
          <button v-for="diff in Object.keys(leaderboardData)" :key="diff" @click="currentBoardTab = diff" :class="['px-5 py-1.5 rounded-full font-black transition-all text-xs md:text-sm', currentBoardTab === diff ? 'bg-red-600 text-white shadow-lg shadow-red-600/40' : 'bg-slate-800 text-slate-400 hover:bg-slate-700']" v-text="diff">
          </button>
        </div>
        <div class="bg-slate-900/80 border border-white/10 rounded-[1.5rem] p-4 md:p-8 shadow-2xl backdrop-blur-md">
          <div class="grid grid-cols-12 gap-2 text-slate-500 text-xs md:text-sm font-black uppercase mb-4 px-2 border-b border-white/10 pb-3">
            <div class="col-span-2 text-center">排名</div>
            <div class="col-span-4 text-left">英雄名號</div>
            <div class="col-span-3 text-center">通關時間</div>
            <div class="col-span-3 text-center">失誤</div>
          </div>
          <div v-for="(player, index) in leaderboardData[currentBoardTab]" :key="index" :class="['grid grid-cols-12 gap-2 items-center p-3 md:p-4 rounded-xl mb-2 transition-all', index === 0 ? 'bg-gradient-to-r from-yellow-900/40 to-transparent border border-yellow-500/30' : index === 1 ? 'bg-slate-800/50' : index === 2 ? 'bg-orange-950/30' : 'hover:bg-white/5']">
            <div class="col-span-2 flex justify-center">
              <i v-if="index === 0" class="ph-fill ph-medal text-2xl md:text-3xl text-yellow-400"></i>
              <i v-else-if="index === 1" class="ph-fill ph-medal text-2xl md:text-3xl text-slate-300"></i>
              <i v-else-if="index === 2" class="ph-fill ph-medal text-2xl md:text-3xl text-orange-400"></i>
              <span v-else class="text-sm md:text-base font-bold text-slate-500" v-text="index + 1"></span>
            </div>
            <div class="col-span-4 flex flex-col text-left">
              <span :class="['font-black text-sm md:text-xl truncate', index === 0 ? 'text-yellow-400' : 'text-white']" v-text="player.name"></span>
              <span class="text-[10px] md:text-xs text-slate-400 font-bold" v-text="player.profession"></span>
            </div>
            <div class="col-span-3 text-center font-mono text-sm md:text-base font-bold text-emerald-400" v-text="formatTime(player.time)"></div>
            <div class="col-span-3 text-center text-xs md:text-sm font-bold text-red-400" v-text="player.errors + ' 次'"></div>
          </div>
        </div>
      </div>
    </div>

    <div v-if="gameState === 'SELECT_DIFFICULTY'" class="w-full h-full bg-slate-950 flex flex-col items-center justify-center p-4 text-center overflow-y-auto scrollbar-hide">
      <button @click="gameState = 'START'" class="absolute top-4 left-4 flex items-center space-x-2 text-slate-400 hover:text-white font-bold text-xs bg-white/5 px-3 py-1.5 rounded-full border border-white/10">
        <i class="ph-bold ph-arrow-left"></i> <span>返回</span>
      </button>
      <h2 class="text-3xl font-black mb-8 tracking-widest uppercase mt-6">選擇試煉難度</h2>
      <div class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 gap-4 w-full max-w-4xl">
        <button v-for="(sheetName, index) in Object.keys(allVocab)" :key="sheetName" @click="initGameWords(sheetName)" :class="['group p-6 rounded-[2rem] bg-gradient-to-br border border-white/10 transition-all hover:scale-105', getDifficultyColor(index)]">
          <p class="text-2xl font-black mb-1" v-text="sheetName"></p>
          <p class="text-[10px] bg-black/40 py-0.5 px-2.5 rounded-full inline-block font-black uppercase" v-text="allVocab[sheetName].length + ' 單字'"></p>
        </button>
      </div>
    </div>

    <div v-if="gameState === 'SELECT_HERO'" class="w-full h-full bg-slate-950 flex flex-col items-center justify-center p-4 text-center relative overflow-y-auto scrollbar-hide">
      <button @click="gameState = 'SELECT_DIFFICULTY'" class="absolute top-4 left-4 flex items-center space-x-2 text-slate-400 hover:text-white font-bold text-xs bg-white/5 px-3 py-1.5 rounded-full border border-white/10">
        <i class="ph-bold ph-arrow-left"></i> <span>返回</span>
      </button>
      <h2 class="text-3xl font-black mb-8 tracking-widest uppercase mt-6">選擇冒險者</h2>
      <div class="grid grid-cols-2 md:grid-cols-4 gap-4 w-full max-w-4xl">
        <button v-for="[key, id] in Object.entries(IDS.hero)" :key="key" @click="handleHeroSelect(key, id)" class="group bg-slate-900 border-2 border-slate-800 hover:border-red-600 rounded-2xl overflow-hidden transition-all aspect-[3/4] relative">
          <img :src="getImgUrl(id)" class="absolute inset-0 w-full h-full object-cover group-hover:scale-105 transition-all" :alt="key"/>
          <div class="absolute inset-0 bg-gradient-to-t from-black via-transparent opacity-90"></div>
          <div class="absolute bottom-4 left-0 right-0 font-black text-xl" v-text="heroNames[key]"></div>
        </button>
      </div>
      <div v-if="showNamePrompt" class="fixed inset-0 z-50 flex items-center justify-center p-4 bg-black/80 backdrop-blur-sm">
        <div class="bg-slate-900 border border-white/10 p-6 rounded-2xl shadow-2xl w-full max-w-sm">
          <h3 class="text-xl font-black mb-1">輸入玩家名稱</h3>
          <p class="text-slate-400 text-xs mb-4">這將顯示在排行榜上！</p>
          <input type="text" v-model="playerName" placeholder="請輸入名號..." class="w-full bg-black/50 border-2 border-slate-700 rounded-xl px-4 py-2.5 text-base text-center focus:border-red-500 outline-none mb-4" @keydown.enter="confirmHero" />
          <p v-if="formError" class="text-red-500 text-xs mb-3" v-text="formError"></p>
          <div class="flex space-x-3">
            <button @click="showNamePrompt = false" class="flex-1 py-2 rounded-xl bg-slate-800 font-bold hover:bg-slate-700 text-sm">取消</button>
            <button @click="confirmHero" class="flex-1 py-2 rounded-xl bg-red-600 font-bold shadow-lg shadow-red-600/30 hover:bg-red-500 text-sm">確認出陣</button>
          </div>
        </div>
      </div>
    </div>

    <div v-if="gameState === 'BATTLE'" class="w-full h-full bg-slate-950 relative flex flex-col justify-between p-4 overflow-hidden select-none">
      <div class="flex justify-between items-center z-50 mb-2 max-w-4xl w-full mx-auto flex-shrink-0">
        <button @click="gameState = 'SELECT_HERO'" class="flex items-center space-x-1.5 text-slate-400 hover:text-red-500 transition-all font-bold text-xs bg-black/60 px-3 py-1.5 rounded-full border border-white/10 backdrop-blur-md">
          <i class="ph-bold ph-arrow-left"></i> <span>撤退</span>
        </button>
        <div class="flex items-center space-x-1.5 bg-black/60 px-4 py-1.5 rounded-full border border-white/10 backdrop-blur-md">
          <i class="ph-bold ph-timer text-yellow-500 text-base"></i>
          <span class="font-mono font-bold text-base text-yellow-400 tracking-wider" v-text="formatTime(timeElapsed)"></span>
        </div>
      </div>

      <div class="absolute inset-0 flex items-center justify-center opacity-5 pointer-events-none z-0">
        <img :src="getImgUrl(currentEnemy.id)" class="w-full h-full object-cover blur-sm" />
      </div>
      
      <div class="game-container w-full max-w-4xl mx-auto flex-grow z-10 my-auto justify-center">
        
        <div :class="['relative flex items-center justify-center h-[140px] xs:h-[180px] md:h-[350px] md:flex-1 transition-transform duration-300 flex-shrink-0 mb-3 md:mb-0', isHitting ? 'translate-x-2 scale-105' : '']">
          <img :src="getImgUrl(currentEnemy.id)" class="h-full w-auto object-contain drop-shadow-[0_0_25px_rgba(220,38,38,0.4)]" />
          <div class="absolute top-0 left-0 bg-black/90 backdrop-blur-md border-l-4 border-red-600 px-3 py-0.5 rounded-br-xl z-20 text-left shadow-md">
            <p class="text-red-500 text-[8px] uppercase font-bold tracking-[0.1em]">Boss Fight</p>
            <p class="text-xs font-black italic uppercase" v-text="currentEnemy.name"></p>
          </div>
        </div>

        <div class="bg-slate-900/95 backdrop-blur-md p-4 md:p-6 rounded-2xl border border-white/10 shadow-xl flex-shrink-0 w-full max-w-md mx-auto md:flex-1">
          <div class="flex justify-between items-center mb-3">
            <div class="flex space-x-1">
              <div v-for="i in ENEMY_MAX_HP" :key="i" :class="['w-4 h-4 rounded-md flex items-center justify-center transition-all duration-500', (i - 1) < (ENEMY_MAX_HP - wordIndex) ? 'bg-red-600 shadow-[0_0_10px_rgba(220,38,38,0.5)]' : 'bg-slate-800 opacity-20 scale-90']">
                <span class="text-[8px]">{{ (i - 1) < (ENEMY_MAX_HP - wordIndex) ? '♥' : '💀' }}</span>
              </div>
            </div>
            <h3 class="text-xl md:text-2xl font-black tracking-tight text-white uppercase bg-black/30 px-3 py-0.5 rounded-lg" v-text="currentWordObj?.c || ''"></h3>
          </div>

          <div class="bg-black/60 p-3 rounded-xl mb-3 border border-white/5 flex items-center justify-between shadow-inner">
            <div class="text-xl md:text-2xl font-mono tracking-[0.1em] text-red-500/90 pl-1 font-bold" v-text="getHint()"></div>
            <button @click="speakWord" :disabled="isSpeaking" :class="['p-2 rounded-full transition-all flex-shrink-0', isSpeaking ? 'bg-red-500 animate-pulse scale-105' : 'bg-white/5 hover:bg-white/10']">
              <i :class="['ph-fill ph-speaker-high text-lg md:text-xl', isSpeaking ? 'text-white' : 'text-slate-400']"></i>
            </button>
          </div>

          <form @submit.prevent="checkAnswer" class="space-y-2">
            <input type="text" ref="wordInput" v-model="userInput" placeholder="拼寫單字發動攻擊..." class="w-full bg-black/60 border-2 border-slate-700 focus:border-red-600 rounded-xl px-4 py-2.5 text-base font-bold lowercase text-center outline-none transition-all"/>
            <button type="submit" class="w-full bg-gradient-to-r from-red-700 to-red-900 py-2.5 rounded-xl font-black text-base shadow-md active:scale-[0.98] uppercase tracking-wider transition-all">斬 滅 邪 靈</button>
          </form>
          <div v-if="message" :class="['mt-2 p-1 rounded-xl text-center font-black text-[10px] tracking-widest', message.includes('漂亮') ? 'bg-green-500/10 text-green-400' : 'bg-red-500/10 text-red-400']" v-text="message"></div>
        </div>
      </div>

      <div class="w-full max-w-md md:max-w-4xl mx-auto z-30 mt-2 flex-shrink-0">
        <div class="bg-slate-900/95 border border-white/10 px-4 py-1.5 rounded-xl flex items-center space-x-3 w-full shadow-lg">
          <div class="w-8 h-8 rounded-lg bg-slate-800 border border-red-600 overflow-hidden shadow-md flex-shrink-0">
            <img :src="selectedHero.imageUrl" class="w-full h-full object-cover" />
          </div>
          <div class="flex-grow text-left">
            <div class="flex justify-between items-end mb-0.5">
              <p class="font-black text-[10px] md:text-xs italic tracking-tight uppercase" v-text="selectedHero.name + ' - ' + selectedHero.profession"></p>
              <span class="text-[8px] text-slate-500 font-black uppercase" v-text="'HP ' + (maxErrors - totalErrors) + ' / ' + maxErrors"></span>
            </div>
            <div class="w-full bg-slate-950 h-1 rounded-full overflow-hidden border border-white/5">
              <div class="bg-gradient-to-r from-red-600 to-red-400 h-full transition-all duration-1000" :style="{ width: ((maxErrors - totalErrors) / maxErrors * 100) + '%' }"></div>
            </div>
          </div>
        </div>
      </div>
    </div>

    <div v-if="gameState === 'GAME_OVER' || gameState === 'VICTORY'" class="w-full h-full bg-slate-950 flex flex-col items-center justify-start py-8 px-4 relative overflow-y-auto scrollbar-hide">
      <div class="relative mb-4 flex flex-col items-center mt-4">
        <img :src="selectedHero?.imageUrl" :class="['w-24 h-24 md:w-32 md:h-32 object-cover rounded-full border-4 transition-all', gameState === 'VICTORY' ? 'border-yellow-500 shadow-yellow-500/50 shadow-xl' : 'border-red-900 grayscale opacity-40']" />
        <h1 :class="['text-4xl md:text-6xl font-black mt-4 mb-1 italic tracking-tighter drop-shadow-2xl text-center', gameState === 'VICTORY' ? 'text-yellow-400' : 'text-red-600 animate-pulse']" v-text="gameState === 'VICTORY' ? '百鬼封印完成' : 'YOU DIED'">
        </h1>
        <p class="text-xs md:text-sm text-slate-400 tracking-widest font-black uppercase text-center" v-text="selectedHero?.name + (gameState === 'VICTORY' ? ' 之武勇已銘刻歷史' : ' 靈魂已在此消散')">
        </p>
        
        <div v-if="gameState === 'VICTORY'" class="mt-4 bg-yellow-500/10 border border-yellow-500/30 px-5 py-2 rounded-full flex items-center space-x-2 text-yellow-400 font-black text-sm md:text-base">
          <i class="ph-fill ph-timer text-lg"></i>
          <span v-text="'通關時間：' + formatTime(timeElapsed)"></span>
        </div>
      </div>

      <div class="w-full max-w-4xl bg-slate-900/80 border border-white/10 rounded-2xl p-4 mb-6 shadow-xl backdrop-blur-md">
        <div class="flex flex-col sm:flex-row justify-between items-center mb-4 gap-2 px-1">
          <h2 class="text-base md:text-xl font-black uppercase tracking-widest flex items-center"><i class="ph-fill ph-scroll text-red-500 mr-2 text-xl"></i>【<span v-text="difficulty"></span>】戰報紀錄</h2>
          <div class="text-[10px] md:text-xs font-bold text-slate-400 bg-black/50 px-3 py-1 rounded-full border border-white/5">
            完美討伐 <span class="text-emerald-400 font-bold" v-text="perfectCount"></span> / <span v-text="encounteredWordsList.length"></span>
          </div>
        </div>
        <div class="grid grid-cols-1 sm:grid-cols-2 gap-2">
          <div v-for="(wordObj, i) in encounteredWordsList" :key="i" :class="['flex items-center justify-between p-3 md:p-4 rounded-xl border', (wordErrors[wordObj.w] || 0) === 0 ? 'bg-emerald-500/5 border-emerald-500/10' : 'bg-red-500/5 border-red-500/10']">
            <div class="flex flex-col text-left">
              <span class="font-mono text-base md:text-lg font-black" v-text="wordObj.w"></span>
              <span class="text-xs text-slate-400 mt-0.5" v-text="wordObj.c"></span>
            </div>
            <div>
              <span v-if="(wordErrors[wordObj.w] || 0) === 0" class="flex items-center space-x-1 text-emerald-400 text-[10px] md:text-xs font-bold bg-emerald-500/20 px-2 py-0.5 rounded-full">
                <i class="ph-bold ph-check"></i><span>無傷</span>
              </span>
              <span v-else class="flex items-center space-x-1 text-red-400 text-[10px] md:text-xs font-bold bg-red-500/20 px-2 py-0.5 rounded-full">
                <i class="ph-bold ph-x"></i><span>失誤 <span v-text="wordErrors[wordObj.w]"></span> 次</span>
              </span>
            </div>
          </div>
        </div>
      </div>
      
      <div class="flex flex-col sm:flex-row gap-3 mb-6 z-50 w-full max-w-sm px-4">
        <button @click="resetGame" :class="['w-full py-3 rounded-full font-black text-lg transition-all shadow-md active:scale-95', gameState === 'VICTORY' ? 'bg-white text-black hover:bg-slate-200' : 'bg-red-600 text-white shadow-red-600/50 hover:bg-red-500']">再續傳奇</button>
        <button v-if="gameState === 'VICTORY'" @click="openLeaderboard" class="w-full py-3 rounded-full font-black text-lg transition-all shadow-md active:scale-95 bg-yellow-500 text-black hover:bg-yellow-400 shadow-yellow-500/50"><i class="ph-fill ph-trophy mr-1"></i>查看英雄榜</button>
      </div>
    </div>

  </div>

  <script>
    const { createApp, ref, computed, watch } = Vue;

    const GAS_WEBAPP_URL = 'https://script.google.com/macros/s/AKfycbxnyblZMZTDFquVdRCZ4d82L5NsRWInsoFRCzlWLqBFYzjGtjbkysumRdy61z0aWsnYsA/exec'; 

    createApp({
      setup() {
        // === 🚀 皓孩子中央銀行串接點數專用變數 ===
        const urlParams = new URLSearchParams(window.location.search);
        const studentUid = ref(urlParams.get('uid'));
        const studentName = ref(urlParams.get('name'));
        const childIdx = ref(urlParams.get('idx') || '0');

        const gameState = ref('LOADING');
        const allVocab = ref({});
        const difficulty = ref(null);
        const gameWords = ref([]);
        const selectedHero = ref(null);
        const enemyIndex = ref(0);
        const wordIndex = ref(0);
        const userInput = ref('');
        const totalErrors = ref(0);
        const wrongCountThisWord = ref(0);
        const wordErrors = ref({});
        const message = ref('');
        const isHitting = ref(false);
        const isSpeaking = ref(false);
        const formError = ref('');
        const showNamePrompt = ref(false);
        const pendingHero = ref(null);
        const playerName = ref('');
        
        const timeElapsed = ref(0);
        let timerInterval = null;
        const leaderboardData = ref({});
        const currentBoardTab = ref('');

        const maxErrors = 10;
        const ENEMY_MAX_HP = 5;

        const IDS = {
          hero: {
            princess: '1YTdCCTLhcfIrZ15biInKjfguwHjVX6TP',
            ninja: '1gApeoE9fXD0U6D7JxSdHeqzKYBk-EO26',
            samurai: '1Q7AGw8CHNnBHpVgHxzWiIQ3EvBu70vwx',
            ronin: '1Zx8Jn-xim0-ab2kLyJhdVgMIP5_N-3EF'
          },
          enemy: [
            { name: '雨傘鬼', id: '1fK4BZTqhpmMnp3VOCXculNhv3MJcrXZI', title: 'Kasa-obake' },
            { name: '天狗', id: '1FHmICKs131-jO9h-2xQXPub3IO1m78xS', title: 'Tengu' },
            { name: '雷神', id: '1LdkCECn8WA6aUzskjSruKUYEnXZOOtV3', title: 'Raijin' },
            { name: '雪女', id: '1tgxvvLbEFUm8TKSQIBSjnFWSV_boeQSs', title: 'Yuki-onna' }
          ]
        };

        const heroNames = { princess: '公主', ronin: '浪人', samurai: '武士', ninja: '忍者' };

        const getImgUrl = (id) => `https://drive.google.com/thumbnail?id=${id}&sz=w1000`;

        const runServer = async (actionName, payload = null) => {
          try {
            let url = `${GAS_WEBAPP_URL}?action=${actionName}`;
            let options = { method: 'GET' };
            
            if (actionName === 'saveScore' && payload) {
              url = GAS_WEBAPP_URL;
              options = {
                method: 'POST',
                mode: 'no-cors',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
              };
            }

            const response = await fetch(url, options);
            if (actionName === 'saveScore') return true; 

            const resData = await response.json();
            if (resData.success) return resData.data;
            throw new Error(resData.message || '後端回傳錯誤');
          } catch (e) {
            console.error(`網路請求失敗 [${actionName}]:`, e);
            throw e;
          }
        };

        const formatTime = (seconds) => {
          const m = Math.floor(seconds / 60).toString().padStart(2, '0');
          const s = (seconds % 60).toString().padStart(2, '0');
          return `${m}:${s}`;
        };

        watch(gameState, (newState) => {
          if (newState === 'BATTLE') {
            timeElapsed.value = 0;
            clearInterval(timerInterval);
            timerInterval = setInterval(() => { timeElapsed.value++; }, 1000);
          } else {
            clearInterval(timerInterval);
          }
        });

        const fetchServerData = async () => {
          try {
            const globalData = await runServer('getVocabData');
            allVocab.value = globalData;
            setTimeout(() => gameState.value = 'START', 400);
          } catch (error) {
            formError.value = "讀取資料失敗，請確認後端網址設定正確。";
            gameState.value = 'START';
          }
        };
        fetchServerData();

        const getDifficultyColor = (index) => {
          const colorClasses = ['from-emerald-600 to-emerald-950', 'from-blue-600 to-blue-950', 'from-purple-600 to-purple-950', 'from-orange-600 to-orange-950', 'from-rose-600 to-rose-950'];
          return colorClasses[index % colorClasses.length];
        };

        const initGameWords = (diff) => {
          const combined = [...(allVocab.value[diff] || [])];
          if (combined.length < 20) {
            alert(`該難度單字量不足 20 個，請檢查試算表`);
            return;
          }
          difficulty.value = diff;
          gameWords.value = [...combined].sort(() => 0.5 - Math.random()).slice(0, 20);
          gameState.value = 'SELECT_HERO';
        };

        const handleHeroSelect = (key, id) => {
          pendingHero.value = { key, id, professionName: heroNames[key] };
          showNamePrompt.value = true;
          // 💡 智慧連動優化：如果主系統已經傳名字過來，就自動帶入玩家名稱，不用學生自己打！
          playerName.value = studentName.value ? studentName.value : '';
          formError.value = '';
        };

        const confirmHero = () => {
          if (!playerName.value.trim()) {
            formError.value = "請輸入您的名字！";
            return;
          }
          formError.value = '';
          selectedHero.value = {
            key: pendingHero.value.key,
            name: playerName.value.trim(),
            imageUrl: getImgUrl(pendingHero.value.id),
            profession: pendingHero.value.professionName
          };
          showNamePrompt.value = false;
          gameState.value = 'BATTLE';
        };

        const currentEnemy = computed(() => IDS.enemy[enemyIndex.value] || IDS.enemy[0]);
        const currentWordObj = computed(() => gameWords.value[enemyIndex.value * 5 + wordIndex.value]);

        const getHint = () => {
          const word = currentWordObj.value?.w || '';
          if (!word) return '';
          const alphaOnly = word.replace(/[^a-zA-Z]/g, '');
          let revealed = 2 + wrongCountThisWord.value;
          let res = '';
          let alphaCounter = 0;
          for (let char of word) {
            if (/[a-zA-Z]/.test(char)) {
              if (alphaCounter === 0 || alphaCounter === alphaOnly.length - 1 || alphaCounter < revealed - 1) res += char;
              else res += '_';
              alphaCounter++;
            } else res += char;
          }
          return res.split('').join(' ');
        };

        const speakWord = () => {
          const word = currentWordObj.value?.w;
          if (!word) return;
          isSpeaking.value = true;
          window.speechSynthesis.cancel();
          const utterance = new SpeechSynthesisUtterance(word);
          utterance.lang = 'en-US';
          utterance.onend = () => isSpeaking.value = false;
          utterance.onerror = () => isSpeaking.value = false;
          window.speechSynthesis.speak(utterance);
        };

        const checkAnswer = () => {
          const currentWord = currentWordObj.value?.w || '';
          if (userInput.value.toLowerCase().trim() === currentWord.toLowerCase().trim()) {
            isHitting.value = true;
            message.value = '漂亮的一擊！';
            setTimeout(() => {
              isHitting.value = false;
              nextQuestion();
            }, 600);
          } else {
            wordErrors.value[currentWord] = (wordErrors.value[currentWord] || 0) + 1;
            const nextErrors = totalErrors.value + 1;
            wrongCountThisWord.value++;
            if (nextErrors >= maxErrors) {
              gameState.value = 'GAME_OVER';
            } else {
              totalErrors.value = nextErrors;
              message.value = '攻擊落空！';
              userInput.value = '';
            }
          }
        };

        // === 🎁 皓孩子中央銀行：過關自動發放點數邏輯 ===
        const processPointsPayout = () => {
          // 檢查是不是由中央銀行主網頁連動過來的學生，如果是外人遊客就不處理
          if (!studentUid.value) return;

          // 以完美擊殺次數當作給點標準（答對題數就是20題滿分，減去有失誤的單字）
          const finalScore = perfectCount.value * 10; 
          // 換算預計發放的點數（答對1題給3點，最高 60 點，最低保障 10 點）
          const rewardPoints = Math.max(perfectCount.value * 3, 10);

          // 核心安全反作弊暗號（以 hago_點數_學生UID 進行 base64 加密，防學生竄改網址）
          const securityCheck = btoa(`hago_${rewardPoints}_${studentUid.value}`);

          // 打包建立返航主系統點生存摺的 URL
          const backToPointsUrl = `https://weiiiik12.github.io/points/?completedGame=vocab&points=${rewardPoints}&idx=${childIdx.value}&auth=${securityCheck}`;

          // 跳出神聖且驚豔的戰略結算寶箱
          Swal.fire({
            title: '🎉 討伐凱旋完成！',
            html: `勇者 <b>${selectedHero.value.name}</b> 完美擊殺了 <b>${perfectCount.value}</b> 隻邪靈！<br>
                   成功換取 <b>${rewardPoints}</b> 點數大獎！`,
            icon: 'success',
            iconColor: '#f1c40f',
            background: '#1e293b',
            color: '#fff',
            confirmButtonText: '🚀 點我把點數匯回皓孩子網',
            confirmButtonColor: '#ff9f43',
            allowOutsideClick: false
          }).then((result) => {
            if (result.isConfirmed) {
              // 帥氣返航主系統
              window.location.href = backToPointsUrl;
            }
          });
        };

        const nextQuestion = async () => {
          userInput.value = '';
          wrongCountThisWord.value = 0;
          message.value = '';
          if (wordIndex.value < 4) {
            wordIndex.value++;
          } else if (enemyIndex.value < 3) {
            enemyIndex.value++;
            wordIndex.value = 0;
            message.value = `✨ 已擊破敵將！`;
          } else {
            // 進入這裡代表 4 隻 Boss 通通成功斬滅（20個單字全答對）
            clearInterval(timerInterval);
            gameState.value = 'VICTORY';
            
            // 先發送原本的排行榜 GAS 資料
            await runServer('saveScore', {
              name: selectedHero.value.name,
              profession: selectedHero.value.profession,
              difficulty: difficulty.value,
              timeSeconds: timeElapsed.value,
              errors: totalErrors.value
            });

            // 隨後啟動點數匯回中央銀行的神聖儀式！
            setTimeout(() => {
              processPointsPayout();
            }, 800);
          }
        };

        const resetGame = () => {
          gameState.value = 'START'; difficulty.value = null; gameWords.value = []; selectedHero.value = null;
          enemyIndex.value = 0; wordIndex.value = 0; totalErrors.value = 0; wrongCountThisWord.value = 0;
          userInput.value = ''; message.value = ''; wordErrors.value = {}; showNamePrompt.value = false;
          pendingHero.value = null; playerName.value = '';
        };

        const openLeaderboard = async () => {
          gameState.value = 'LOADING';
          try {
            const boardData = await runServer('getLeaderboard');
            leaderboardData.value = boardData;
            if (Object.keys(boardData).length > 0) currentBoardTab.value = Object.keys(boardData)[0];
            gameState.value = 'LEADERBOARD';
          } catch(e) {
            alert("英雄榜讀取失敗");
            gameState.value = 'START';
          }
        };

        const encounteredWordsList = computed(() => {
          const len = gameState.value === 'VICTORY' ? gameWords.value.length : enemyIndex.value * 5 + wordIndex.value + 1;
          return gameWords.value.slice(0, len);
        });

        const perfectCount = computed(() => {
          return encounteredWordsList.value.filter(w => !wordErrors.value[w.w]).length;
        });

        return {
          gameState, allVocab, difficulty, gameWords, selectedHero, enemyIndex, wordIndex, userInput,
          totalErrors, wrongCountThisWord, wordErrors, message, isHitting, isSpeaking, formError,
          showNamePrompt, playerName, timeElapsed, leaderboardData, currentBoardTab, maxErrors, ENEMY_MAX_HP,
          IDS, heroNames, getImgUrl, formatTime, getDifficultyColor, initGameWords, handleHeroSelect,
          confirmHero, currentEnemy, currentWordObj, getHint, speakWord, checkAnswer, resetGame, openLeaderboard,
          encounteredWordsList, perfectCount, studentName
        };
      }
    }).mount('#app');
  </script>
</body>
</html>
